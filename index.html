<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>вҡ– жі•иҰҸйҖҡ вҖ” еңӢиҖғжі•иҰҸйҖҹжҹҘ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pri:#78350F;--acc:#B45309;--bg:#F8FAFC;--card:#FFF;--tx:#1E293B;--tx2:#64748B;--tx3:#94A3B8;--bd:#E2E8F0}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--tx)}
#loading{position:fixed;inset:0;background:#FFFBEB;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-size:18px;color:var(--pri)}
#loading.hide{display:none}

.hdr{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);padding:14px 20px;border-bottom:1px solid #F5E6B8;display:flex;align-items:baseline;gap:14px;position:sticky;top:0;z-index:100}
.hdr h1{font-size:22px;color:var(--pri)}
.hdr .sub{font-size:13px;color:var(--acc)}
.tabs{display:flex;background:#FFF;border-bottom:2px solid var(--bd);position:sticky;top:52px;z-index:99}
.tab{flex:1;padding:11px;text-align:center;cursor:pointer;font-weight:700;font-size:14px;color:var(--tx3);border-bottom:3px solid transparent;transition:.2s}
.tab:hover{color:var(--tx2)}
.tab.on{color:var(--pri);border-bottom-color:var(--acc)}
.sarea{padding:14px 20px 6px;position:sticky;top:96px;z-index:98;background:var(--bg)}
.sbox{display:flex;align-items:center;gap:10px;background:#FFF;border:2px solid var(--bd);border-radius:14px;padding:10px 16px}
.sbox input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit}
.sbox .x{cursor:pointer;color:var(--tx3);font-size:18px;padding:0 4px}
.cbar{display:flex;gap:8px;padding:8px 20px;overflow-x:auto}
.cbtn{padding:8px 16px;border-radius:20px;border:1.5px solid var(--bd);background:#FFF;color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.15s}
.cbtn:hover{border-color:var(--acc);color:var(--acc)}
.cbtn.on{background:var(--pri);color:#FFF;border-color:var(--pri)}
.main{display:flex;max-width:1100px;margin:0 auto}
.larea{flex:1;padding:4px 20px 40px}
.rail{width:40px;position:sticky;top:150px;height:calc(100vh - 170px);display:flex;flex-direction:column;justify-content:space-between;align-items:center;padding:6px 0;cursor:pointer;user-select:none}
.rail span{font-size:9px;color:var(--tx3);font-weight:700}
.rail:hover span{color:var(--pri)}
.rcnt{padding:2px 0 6px;font-size:13px;color:var(--tx3)}

/* Colors */
.lc-0{--a:#D97706;--b:#FEF3C7;--c:#92400E;--d:#FFFBEB}
.lc-1{--a:#3B82F6;--b:#DBEAFE;--c:#1E40AF;--d:#EFF6FF}
.lc-2{--a:#EF4444;--b:#FEE2E2;--c:#991B1B;--d:#FEF2F2}
.lc-3{--a:#10B981;--b:#D1FAE5;--c:#065F46;--d:#ECFDF5}
.lc-4{--a:#6366F1;--b:#E0E7FF;--c:#3730A3;--d:#EEF2FF}
.lc-5{--a:#EC4899;--b:#FCE7F3;--c:#9D174D;--d:#FDF2F8}
.lc-6{--a:#14B8A6;--b:#CCFBF1;--c:#115E59;--d:#F0FDFA}
.lc-7{--a:#06B6D4;--b:#CFFAFE;--c:#155E75;--d:#ECFEFF}
.lc-8{--a:#F43F5E;--b:#FFE4E6;--c:#9F1239;--d:#FFF1F2}
.lc-9{--a:#A855F7;--b:#F3E8FF;--c:#6B21A8;--d:#FAF5FF}

.cd{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:8px;border-left:4px solid var(--a,#6B7280);cursor:pointer;transition:box-shadow .15s}
.cd:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.cdt{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.bdg{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--b,#F3F4F6);color:var(--c,#374151)}
.cdn{font-size:15px;font-weight:700}
.cdp{font-size:11px;color:var(--tx3)}
.cdch{font-size:12px;color:var(--a);font-weight:700;margin-bottom:2px}
.cdtx{font-size:14px;line-height:1.65;color:var(--tx2);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cdkw{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.kwt{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--d,#F5F5F5);color:var(--c,#374151)}
.bm{margin-left:auto;cursor:pointer;font-size:20px;color:#D1D5DB;transition:.15s}
.bm.on{color:#D97706}

/* Modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.ov.show{display:block}
.mo{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:700px;max-height:85vh;background:#FFF;border-radius:20px 20px 0 0;z-index:201;display:flex;flex-direction:column}
.mh{width:36px;height:4px;background:#D1D5DB;border-radius:2px;margin:10px auto 6px}
.mhd{display:flex;align-items:center;gap:10px;padding:10px 20px 12px;border-bottom:3px solid var(--a,#999);flex-wrap:wrap}
.mhd .an{font-size:20px;font-weight:800}
.mhd .st{font-weight:700;color:var(--a)}
.mcl{margin-left:auto;cursor:pointer;font-size:24px;color:var(--tx3);padding:4px 8px}
.mb{flex:1;overflow-y:auto;padding:16px 20px 40px}

.chb{border-left:4px solid var(--a,#999);background:var(--d,#F9FAFB);padding:10px 14px;border-radius:8px;margin-bottom:16px;font-weight:700;color:var(--c)}
.pr{border-left:3px solid var(--a,#999);padding:10px 14px;margin-bottom:2px;background:#FFF;border-radius:8px}
.pr.ind{margin-left:28px;border-left:2px solid #CBD5E1;background:#FAFAFA;padding:6px 12px}
.pl{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;margin-bottom:6px}
.pl.xi{background:var(--b,#F3F4F6);color:var(--c,#374151)}
.pl.ku{background:#F1F5F9;color:#64748B}
.pt{font-size:15px;line-height:1.8}
.pr.ind .pt{font-size:14px;line-height:1.7}
.xr{color:#2563EB;font-weight:700;cursor:pointer;border-bottom:2px solid #93C5FD;text-decoration:none}
.xr:hover{background:#EFF6FF}
.sec{margin-top:24px}
.sct{font-size:14px;font-weight:700;color:var(--pri);margin-bottom:10px}
.kww{display:flex;flex-wrap:wrap;gap:8px}
.kwc{padding:5px 14px;border-radius:16px;font-size:13px;font-weight:600;cursor:pointer;background:var(--d);color:var(--c)}
.nta{width:100%;border:2px solid var(--acc);border-radius:10px;padding:12px;font-size:14px;font-family:inherit;resize:vertical;min-height:80px}
.btn{padding:6px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-family:inherit;font-size:13px}
.bp{background:var(--acc);color:#FFF}
.nb{background:#FFFBEB;border:1px solid #FDE68A;border-radius:10px;padding:14px;margin-top:8px;white-space:pre-wrap}

/* Interp */
.ic{background:#FFF;border-left:4px solid #3B82F6;border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer}
.ic:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.itt{font-size:17px;font-weight:700;color:#1E40AF}
.itd{font-size:12px;color:var(--tx3);margin-bottom:4px}
.iti{font-size:14px;line-height:1.6;color:var(--tx2);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

.pg{display:none}.pg.on{display:block}
.ety{text-align:center;padding:60px 20px;color:var(--tx3)}

@media(max-width:600px){.hdr{padding:12px 16px}.sarea{padding:10px 16px 4px}.cbar{padding:6px 16px}.larea{padding:4px 16px 40px}.mo{max-width:100%}}
</style>
</head>
<body>
<div id="loading"><div style="font-size:48px;margin-bottom:16px">вҡ–</div>жі•иҰҸйҖҡијүе…Ҙдёӯ...</div>

<div class="hdr"><h1>вҡ– жі•иҰҸйҖҡ</h1><span class="sub" id="totalLabel">ијүе…Ҙдёӯ...</span></div>
<div class="tabs">
<div class="tab on" onclick="stab('s')">рҹ”Қ жҗңе°Ӣ</div>
<div class="tab" onclick="stab('i')">рҹ“ң йҮӢеӯ—</div>
<div class="tab" onclick="stab('b')">вӯҗ ж”¶и—Ҹ</div>
<div class="tab" onclick="stab('n')">рҹ“қ зӯҶиЁҳ</div>
</div>

<div class="pg on" id="pg-s">
<div class="sarea"><div class="sbox"><span>рҹ”Қ</span><input id="si" placeholder="жҗңе°Ӣжі•жўқгҖҒй—ңйҚөеӯ—гҖҒжўқиҷҹ..." oninput="ds()"><span class="x" onclick="document.getElementById('si').value='';ds()">вң•</span></div></div>
<div class="cbar" id="cb"></div>
<div class="main"><div class="larea"><div class="rcnt" id="rc"></div><div id="ll"></div></div><div class="rail" id="rl" onmousedown="srd(event)" ontouchstart="srd(event)"></div></div>
</div>

<div class="pg" id="pg-i">
<div class="sarea"><div class="sbox"><span>рҹ”Қ</span><input id="ii" placeholder="жҗңе°Ӣеӯ—иҷҹжҲ–й—ңйҚөеӯ—..." oninput="di()"></div></div>
<div class="larea" style="max-width:700px;margin:0 auto"><div id="il"></div></div>
</div>

<div class="pg" id="pg-b"><div class="larea" style="max-width:700px;margin:0 auto;padding-top:20px"><h2 style="font-size:20px;margin-bottom:16px">вӯҗ жҲ‘зҡ„ж”¶и—Ҹ</h2><div id="bl"></div></div></div>
<div class="pg" id="pg-n"><div class="larea" style="max-width:700px;margin:0 auto;padding-top:20px"><h2 style="font-size:20px;margin-bottom:16px">рҹ“қ жҲ‘зҡ„зӯҶиЁҳ</h2><div id="nl"></div></div></div>

<div class="ov" id="ov" onclick="cm()"><div class="mo" onclick="event.stopPropagation()"><div class="mh"></div><div class="mhd" id="mhd"></div><div class="mb" id="mb"></div></div></div>

<script>
let L=[],I=[],C=[],cc='е…ЁйғЁ',cq='',fl=[],bm=JSON.parse(localStorage.getItem('lawapp_bm')||'[]'),nt=JSON.parse(localStorage.getItem('lawapp_nt')||'{}');

const CM={
'жҶІжі•':0,'жҶІжі•еўһдҝ®жўқж–Ү':0,'ж°‘жі•':1,'еҲ‘жі•':2,'иІӘжұЎжІ»зҪӘжўқдҫӢ':2,
'ж°‘дәӢиЁҙиЁҹжі•':4,'еј·еҲ¶еҹ·иЎҢжі•':4,'еҲ‘дәӢиЁҙиЁҹжі•':5,'йҖҡиЁҠдҝқйҡңеҸҠзӣЈеҜҹжі•':5,
'иЎҢж”ҝзЁӢеәҸжі•':3,'иЎҢж”ҝзҪ°жі•':3,'иЎҢж”ҝеҹ·иЎҢжі•':3,'иЎҢж”ҝиЁҙиЁҹжі•':6,'иЁҙйЎҳжі•':6,
'еңӢе®¶иі е„ҹжі•':0,'еӢһеӢ•еҹәжә–жі•':0,'е®¶еәӯжҡҙеҠӣйҳІжІ»жі•':8,
'и‘—дҪңж¬Ҡжі•':7,'е•ҶжЁҷжі•':7,'е°ҲеҲ©жі•':7,'зҮҹжҘӯз§ҳеҜҶжі•':7,'е…¬еҸёжі•':7,
'е…¬еӢҷдәәе“Ўд»»з”Ёжі•':8,'е…¬еӢҷе“ЎжңҚеӢҷжі•':8,'е…¬еӢҷдәәе“ЎиҖғзёҫжі•':8,
'дёӯеӨ®жі•иҰҸжЁҷжә–жі•':9,'ең°ж–№еҲ¶еәҰжі•':9,'еңӢзұҚжі•':9,
};
function lcc(n){return 'lc-'+(CM[n]??0)}

function gst(ch){if(!ch)return '';const m=ch.match(/(?:з¬¬[\s]*[дёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қеҚҒзҷҫйӣ¶\d]+[\s]*(?:з·Ё|з« |зҜҖ|ж¬ҫ|зӣ®))[\s]*(.+)/);return m&&m[1]?m[1].trim():''}

async function init(){
try{
const[lr,ir]=await Promise.all([fetch('laws.json').then(r=>r.json()),fetch('interpretations.json').then(r=>r.json()).catch(()=>[])]);
L=lr;I=ir;C=[...new Set(L.map(l=>l.lawName))];
document.getElementById('totalLabel').textContent='е…ұ '+L.length+' жўқ';
document.getElementById('loading').classList.add('hide');
rc();ds();di();
}catch(e){document.getElementById('loading').innerHTML='<p>ијүе…ҘеӨұж•—: '+e.message+'</p>';}
}

function stab(t){
document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('on',['s','i','b','n'][i]===t));
document.querySelectorAll('.pg').forEach((e,i)=>e.classList.toggle('on',['s','i','b','n'][i]===t));
if(t==='b')rb();if(t==='n')rn();
}

function rc(){document.getElementById('cb').innerHTML=['е…ЁйғЁ',...C].map(c=>'<div class="cbtn'+(c===cc?' on':'')+'" onclick="sc(\''+c+'\')">'+c+'</div>').join('')}
function sc(c){cc=c;rc();ds()}

function ds(){
cq=document.getElementById('si').value.trim();
fl=L.filter(l=>{
if(cc!=='е…ЁйғЁ'&&l.lawName!==cc)return false;
if(!cq)return true;
const q=cq,f=l.paragraphs.map(p=>p.text).join('');
return f.includes(q)||l.articleNum.includes(q)||l.lawName.includes(q)||(l.chapter&&l.chapter.includes(q))||(l.keywords&&l.keywords.some(k=>k.includes(q)));
});
rl();rr();
}

function rl(){
const e=document.getElementById('ll');
document.getElementById('rc').textContent=(cq?'жҗңе°ӢгҖҢ'+cq+'гҖҚвҖ” ':'')+(cc!=='е…ЁйғЁ'?cc+' ':'')+'е…ұ '+fl.length+' жўқ';
if(!fl.length){e.innerHTML='<div class="ety"><p style="font-size:32px">рҹ”Қ</p><p>жүҫдёҚеҲ°з¬ҰеҗҲзҡ„жі•жўқ</p></div>';return}
const s=fl.slice(0,200);
e.innerHTML=s.map(l=>{
const c=lcc(l.lawName),st=gst(l.chapter),pv=l.paragraphs.map(p=>p.text).join(' ').slice(0,150),ib=bm.includes(l.id),pc=l.paragraphs.length;
return '<div class="cd '+c+'" onclick="ol(\''+l.id+'\')"><div class="cdt"><span class="bdg">'+l.lawName+'</span><span class="cdn">'+l.articleNum+'</span>'+(pc>1?'<span class="cdp">('+pc+'й …)</span>':'')+'<span class="bm'+(ib?' on':'')+'" onclick="event.stopPropagation();tb(\''+l.id+'\')">'+( ib?'вҳ…':'вҳҶ')+'</span></div>'+(st?'<div class="cdch">'+st+'</div>':(l.chapter?'<div style="font-size:11px;color:var(--tx3);margin-bottom:2px">'+l.chapter+'</div>':''))+'<div class="cdtx">'+pv+'</div>'+(l.keywords&&l.keywords.length?'<div class="cdkw">'+l.keywords.slice(0,3).map(k=>'<span class="kwt">'+k+'</span>').join('')+'</div>':'')+'</div>';
}).join('')+(fl.length>200?'<div style="text-align:center;padding:20px;color:var(--tx3)">йЎҜзӨәеүҚ 200 жўқпјҢи«Ӣжҗңе°Ӣзё®е°ҸзҜ„еңҚ</div>':'');
}

function rr(){
const r=document.getElementById('rl');
if(cc==='е…ЁйғЁ'||fl.length<10){r.innerHTML='';return}
const st=Math.max(1,Math.ceil(fl.length/35));let h='';
for(let i=0;i<fl.length;i+=st){const n=fl[i].articleNum.replace(/з¬¬|жўқ|\s/g,'');h+='<span>'+n+'</span>'}
r.innerHTML=h;
}

function srd(e){
e.preventDefault();
const mv=ev=>{const r=document.getElementById('rl').getBoundingClientRect(),y=(ev.touches?ev.touches[0].clientY:ev.clientY)-r.top,rt=Math.max(0,Math.min(1,y/r.height)),idx=Math.round(rt*(Math.min(fl.length,200)-1)),cs=document.querySelectorAll('#ll .cd');if(cs[idx])cs[idx].scrollIntoView({behavior:'auto',block:'start'})};
const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',up)};

function cn2n(s){
  if(!s||/^\d+$/.test(s))return s;
  var m={йӣ¶:0,дёҖ:1,дәҢ:2,дёү:3,еӣӣ:4,дә”:5,е…ӯ:6,дёғ:7,е…«:8,д№қ:9,еҚҒ:10,зҷҫ:100};
  var r=0,c=0;
  for(var i=0;i<s.length;i++){var v=m[s[i]];if(v===undefined)continue;if(v===100){r+=(c||1)*100;c=0}else if(v===10){r+=(c||1)*10;c=0}else c=v}
  return String(r+c);
}
document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);document.addEventListener('touchmove',mv);document.addEventListener('touchend',up);mv(e);
}

function ol(id){
const l=L.find(x=>x.id===id);if(!l)return;
const c=lcc(l.lawName),st=gst(l.chapter),ib=bm.includes(id);
document.getElementById('mhd').innerHTML='<div class="'+c+'" style="flex:1"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span class="bdg">'+l.lawName+'</span><span class="an">'+l.articleNum+'</span><span class="bm'+(ib?' on':'')+'" onclick="tb(\''+id+'\');ol(\''+id+'\')">'+( ib?'вҳ…':'вҳҶ')+'</span></div>'+(st?'<div class="st" style="margin-top:4px">'+st+'</div>':'')+'</div><span class="mcl" onclick="cm()">вң•</span>';

let b='';
if(l.chapter)b+='<div class="chb '+c+'">'+l.chapter+'</div>';

l.paragraphs.forEach(p=>{
const ind=p.indent===1;
const lt=lr(p.text,l.lawName);
b+='<div class="pr '+c+(ind?' ind':'')+'"><div class="pl '+(ind?'ku':'xi')+'">'+p.item+'</div><div class="pt">'+lt+'</div></div>';
});

if(l.keywords&&l.keywords.length){
b+='<div class="sec"><div class="sct">й—ңйҚөеӯ—</div><div class="kww">';
l.keywords.forEach(k=>{b+='<span class="kwc" onclick="document.getElementById(\'si\').value=\''+k+'\';cm();stab(\'s\');ds()">'+k+'</span>'});
b+='</div></div>';
}

const note=nt[id]||'';
b+='<div class="sec"><div class="sct">рҹ“қ жҲ‘зҡ„зӯҶиЁҳ</div><textarea class="nta" id="na" placeholder="ијёе…ҘзӯҶиЁҳгҖҒеҸЈиЁЈгҖҒйҮҚй»һж•ҙзҗҶ...">'+note+'</textarea><div style="margin-top:8px;text-align:right"><button class="btn bp" onclick="sn(\''+id+'\')">е„ІеӯҳзӯҶиЁҳ</button></div></div>';

document.getElementById('mb').innerHTML=b;
document.getElementById('ov').classList.add('show');
document.body.style.overflow='hidden';
}

function cm(){document.getElementById('ov').classList.remove('show');document.body.style.overflow=''}

function lr(text,ln){
return text.replace(/((?:ж°‘жі•|еҲ‘жі•|жҶІжі•|иЎҢж”ҝзЁӢеәҸжі•)?з¬¬[\d\-дёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қеҚҒзҷҫйӣ¶]+жўқ(?:д№Ӣ[\dдёҖдәҢдёүеӣӣдә”е…ӯдёғе…«д№қеҚҒ]+)?)/g,(m)=>{
return '<a class="xr" onclick="event.stopPropagation();or(\''+m.replace(/'/g,'')+'\'  ,\''+ln+'\')">'+m+'</a>';
});
}

function or(ref,ln){
var lm=ref.match(/^(\S+жі•|\S+жўқдҫӢ)/);
var sl=lm?lm[1]:ln;
var np=ref.replace(/^(?:\S+жі•|\S+жўқдҫӢ)/,'').replace(/з¬¬/,'').replace(/жўқ.*$/,'');
np=cn2n(np);
var f=L.find(function(l){
  if(l.lawName!==sl)return false;
  var an=l.articleNum.replace(/[^0-9\-]/g,'');
  return an===np||an===np.replace(/-/g,'-');
});
if(!f&&!lm){f=L.find(function(l){var an=l.articleNum.replace(/[^0-9\-]/g,'');return an===np})}
if(f)ol(f.id);
}
function tb(id){const i=bm.indexOf(id);if(i>-1)bm.splice(i,1);else bm.push(id);localStorage.setItem('lawapp_bm',JSON.stringify(bm));rl()}
function rb(){
const e=document.getElementById('bl'),bs=L.filter(l=>bm.includes(l.id));
if(!bs.length){e.innerHTML='<div class="ety"><p style="font-size:32px">рҹ“‘</p><p>е°ҡз„Ўж”¶и—Ҹ</p></div>';return}
e.innerHTML=bs.map(l=>{const c=lcc(l.lawName);return '<div class="cd '+c+'" onclick="ol(\''+l.id+'\')"><div class="cdt"><span class="bdg">'+l.lawName+'</span><span class="cdn">'+l.articleNum+'</span><span class="bm on" onclick="event.stopPropagation();tb(\''+l.id+'\');rb()">вҳ…</span></div><div class="cdtx">'+l.paragraphs.map(p=>p.text).join(' ').slice(0,100)+'</div></div>'}).join('');
}

function sn(id){const t=document.getElementById('na').value.trim();if(t)nt[id]=t;else delete nt[id];localStorage.setItem('lawapp_nt',JSON.stringify(nt));alert('зӯҶиЁҳе·Іе„ІеӯҳпјҒ')}
function rn(){
const e=document.getElementById('nl'),ids=Object.keys(nt),nd=L.filter(l=>ids.includes(l.id));
if(!nd.length){e.innerHTML='<div class="ety"><p style="font-size:32px">рҹ“қ</p><p>е°ҡз„ЎзӯҶиЁҳ</p></div>';return}
e.innerHTML=nd.map(l=>{const c=lcc(l.lawName);return '<div class="cd '+c+'" onclick="ol(\''+l.id+'\')"><div class="cdt"><span class="bdg">'+l.lawName+'</span><span class="cdn">'+l.articleNum+'</span></div><div class="nb">'+nt[l.id]+'</div></div>'}).join('');
}

function di(){
const e=document.getElementById('il');
if(!I.length){e.innerHTML='<div class="ety"><p style="font-size:32px">рҹ“ң</p><p>е°ҡз„ЎйҮӢеӯ—иіҮж–ҷ</p></div>';return}
const q=(document.getElementById('ii')?.value||'').trim();
let d=[...I].sort((a,b)=>b.num-a.num);
if(q){if(/^\d+$/.test(q))d=d.filter(i=>String(i.num).includes(q));else d=d.filter(i=>(i.issue&&i.issue.includes(q))||(i.mainText&&i.mainText.includes(q)))}
e.innerHTML=d.slice(0,200).map(i=>'<div class="ic" onclick="oi('+i.num+')"><div class="itt">йҮӢеӯ—з¬¬ '+i.num+' иҷҹ</div>'+(i.date?'<div class="itd">'+i.date+'</div>':'')+'<div class="iti">'+(i.issue||i.mainText?.slice(0,100)||'пјҲе…§е®№еҫ…ијүе…Ҙпјү')+'</div></div>').join('');
}

function oi(n){
const i=I.find(x=>x.num===n);if(!i)return;
document.getElementById('mhd').innerHTML='<div style="flex:1"><span style="font-size:20px;font-weight:800;color:#1E40AF">йҮӢеӯ—з¬¬ '+i.num+' иҷҹ</span>'+(i.date?'<span style="font-size:13px;color:var(--tx3);margin-left:8px">('+i.date+')</span>':'')+'</div><span class="mcl" onclick="cm()">вң•</span>';
let b='';
if(i.issue)b+='<div class="sec"><div class="sct" style="color:#1E40AF">зҲӯй»һпјҡ</div><p style="font-size:16px;line-height:1.8;font-weight:700">'+i.issue+'</p></div>';
if(i.mainText)b+='<div class="sec"><div class="sct" style="color:#1E40AF">и§ЈйҮӢж–Үпјҡ</div><p style="font-size:15px;line-height:1.8;white-space:pre-wrap">'+i.mainText+'</p></div>';
if(i.reasoning)b+='<div class="sec"><div class="sct" style="color:#1E40AF">зҗҶз”ұжӣёпјҡ</div><p style="font-size:14px;line-height:1.8;color:#374151;white-space:pre-wrap">'+i.reasoning+'</p></div>';
if(!i.mainText&&!i.reasoning)b+='<div class="ety"><p>жӯӨиҷҹйҮӢеӯ—е°ҡжңӘијүе…Ҙе…§е®№</p></div>';
document.getElementById('mb').innerHTML=b;
document.getElementById('ov').classList.add('show');
document.body.style.overflow='hidden';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')cm()});
init();
</script>
